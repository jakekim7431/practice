<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Arena - Single Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-shell">
        <header class="hud">
            <div class="stat">점수: <strong id="score">0</strong></div>
            <div class="stat">질량: <strong id="mass">40</strong></div>
            <div class="stat">생존 시간: <strong id="time">0s</strong></div>
        </header>

        <section class="arena-wrap">
            <canvas id="arena" width="1200" height="700" aria-label="Cell arena"></canvas>

            <div class="overlay" id="overlay">
                <h1>Cell Arena</h1>
                <p>마우스로 이동하고, 작은 셀을 먹어 성장하세요.</p>
                <p>나보다 큰 셀에게 닿으면 게임 오버입니다.</p>
                <button id="startBtn" type="button">게임 시작</button>
            </div>

            <div class="overlay hidden" id="gameOver">
                <h2>게임 오버</h2>
                <p id="finalText"></p>
                <button id="restartBtn" type="button">다시 시작</button>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
