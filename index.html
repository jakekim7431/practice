<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <div class="topbar">
            <h1>로또 번호 추첨기</h1>
            <button id="themeBtn" class="theme-btn" type="button" aria-label="테마 전환">다크 모드</button>
        </div>
        <p class="subtitle">1~45 중에서 중복 없이 6개 + 보너스 1개를 추첨합니다.</p>

        <section class="card">
            <div class="numbers" id="numbers" aria-live="polite"></div>
            <p class="bonus" id="bonus">보너스 번호: -</p>
            <button id="drawBtn" type="button">번호 추첨</button>
        </section>

        <section class="history-card">
            <h2>최근 추첨 기록</h2>
            <ul id="history" class="history-list"></ul>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
