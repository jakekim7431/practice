<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cell Arena Multiplayer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hud">
      <div class="left">
        <h1>Cell Arena Multiplayer</h1>
        <p class="help">마우스 이동 | Space: 분열 | Q: 점수 10 소모해 보너스 오브 생성(먹으면 +5점)</p>
      </div>
      <div class="stats">
        <div>연결: <strong id="conn">연결 중...</strong></div>
        <div>점수: <strong id="score">0</strong></div>
        <div>질량: <strong id="mass">40</strong></div>
      </div>
    </header>

    <section class="board-wrap">
      <canvas id="game" width="1400" height="800"></canvas>
      <div id="overlay" class="overlay">서버에 연결 중...</div>
      <aside class="leaderboard">
        <h2>리더보드</h2>
        <ol id="leaders"></ol>
      </aside>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
